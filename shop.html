 <h1>Shop</h1>
 <div class="search">
    <label for="shop-search">Search Shop:</label>
    <input type="search" id="shop-search">
    <button class="search-btn">Search</button>
 </div>
  <aside>
    <form id="product-filter">
    <fieldset>
        <legend>Filter Products</legend>

        <!-- Category Filter -->
        <div class="filter-group">
            <label>Category</label>
            <input type="checkbox" name="cpu" value="cpu">CPU<br>
            <input type="checkbox" name="motherboard" value="motherboard">Motherboard<br>
            <input type="checkbox" name="fans" value="fans">Fans<br>
             <input type="checkbox" name="case" value="case">Computer Case<br>
        </div>

        <!-- Price Range Filter -->
        <div class="filter-group">
            <label for="price">Max Price:</label>
            <input type="range" id="price" name="price" min="150" max="5000">
        </div>

        <!-- Submit Button -->
        <button type="submit">Apply Filters</button>
    </fieldset>
    </form>
  </aside>
  <script src="js/shop.js"></script>
