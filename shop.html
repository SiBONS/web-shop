<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <title>PC DOC Shop</title>
</head>
<body>
 <nav id="main-nav">
  <a href="index.html" class="gugi-regular nav-logo">pc:\DOC_</a>

  <input type="checkbox" id="menu-toggle">
  <label for="menu-toggle" id="hamburger">
    <span></span>

  <ul>
    <li><a href="shop.html">SHOP</a></li>

 <h1>Shop</h1>
 <div class="shop-page">
    <div class="shop-controls">
        <input type="search" id="shop-search" placeholder="Search products...">
        <button class="search-btn">Search</button>
        <select id="sort-select">
            <option value="">Sort by...</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="name-asc">Name: A to Z</option>
        </select>
    </div>
 
   <div class="shop-layout">
     <aside>
      <form id="product-filter">
      <fieldset>
        <legend>Filter Products</legend>

        <!-- Category Filter -->
        <div class="filter-group">
            <label>Category</label>
            <label for="cpu"><input id="cpu" type="checkbox" name="cpu" value="cpu">CPU</label><br>
            <label for="motherboard"><input id="motherboard" type="checkbox" name="motherboard" value="motherboard">Motherboard</label><br>
            <label for="fans"><input id="fans" type="checkbox" name="fans" value="fans">Fans</label><br>
             <label for="case"><input type="checkbox" name="case" value="case">Computer Case</label><br>
              <label for="ram"><input type="checkbox" name="ram" value="ram">RAM Memory</label><br>
              <label for="ssd"><input type="checkbox" name="ssd" value="ssd">SSD</label><br>
               <label for="gpu"><input type="checkbox" name="gpu" value="gpu">Graphic Cards</label><br>
                <label for="psu"><input type="checkbox" name="psu" value="psu">Power Supply</label><br>
        </div>

        <!-- Price Range Filter -->
        <div class="filter-group">
            <label for="price">Max Price:</label>
            <input type="range" id="price" name="price" min="150" max="5000">
        </div>

        <!-- Submit Button -->
        <button type="submit">Apply Filters</button>
      </fieldset>
      </form>
    </aside>
    <div id="product-grid"></div>
 </div>
 </div>
  <script src="js/shop.js"></script>
  <footer>
    <p>&copy; pc:\DOC_ 2026</p>
  </footer>
</body>
</html>
